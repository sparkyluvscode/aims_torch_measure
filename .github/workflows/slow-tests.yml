name: Slow tests

# Runs the full test suite including slow-marked tests (e.g. TabPFN) on a
# weekly schedule. Surfaces breakage in code paths that the regular CI loop
# (which filters with `-m "not slow"`) would never exercise.

on:
  schedule:
    - cron: '0 0 * * 1'  # Mondays 00:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"

      - name: Run all non-GPU tests (including slow)
        run: pytest tests/ -v -m "not gpu"
